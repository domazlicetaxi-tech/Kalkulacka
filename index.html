<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Taxi Green</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --green-primary: #15803d; --green-light: #22c55e; --green-dark: #14532d; --green-bg: #f0fdf4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #app-container { display: flex; height: 100dvh; width: 100vw; flex-direction: row; }
        #panel { width: 400px; background: white; overflow-y: auto; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; }
        #map { flex: 1; height: 100%; }
        .input-row { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; margin-top: 5px; }
        .btn-calc { width: 100%; padding: 15px; background: var(--green-primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Administrace */
        #admin-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: white; z-index: 99999; padding: 20px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--green-primary); padding-bottom: 10px; }
        .filter-box { background: #f8fafc; padding: 15px; border-radius: 8px; margin: 15px 0; display: flex; gap: 10px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-size: 13px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        
        /* Registrace */
        #registration-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; padding: 20px; text-align: center; }
        
        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #panel { width: 100%; height: 50%; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="panel">
        <h1 onclick="handleAdminClick()" style="color: var(--green-dark);">Taxi Green</h1>
        
        <div id="registration-overlay">
            <h2>Registrace</h2>
            <input type="text" id="reg-name" placeholder="Jméno"><br><br>
            <input type="text" id="reg-surname" placeholder="Příjmení"><br><br>
            <input type="tel" id="reg-phone" placeholder="Telefon"><br><br>
            <label><input type="checkbox" id="reg-consent"> Souhlasím se zpracováním údajů</label><br><br>
            <button class="btn-calc" onclick="submitRegistration()">Zaregistrovat se</button>
        </div>

        <div class="input-row">
            <input type="text" id="pickup" placeholder="Odkud?">
            <input type="text" id="dropoff" placeholder="Kam?">
            <button class="btn-calc" onclick="handleCalculateRequest()">Vypočítat</button>
        </div>
        <div id="results">Cena: <span id="price-val">0</span> Kč</div>
    </div>
    <div id="map"></div>
</div>

<div id="admin-view">
    <div class="admin-header"><h2>Administrace</h2><button onclick="closeAdmin()">Zavřít</button></div>
    
    <h3>Historie tras</h3>
    <div class="filter-box">
        <input type="date" id="filter-from"> až <input type="date" id="filter-to">
        <button onclick="filterHistory()">Filtrovat</button>
        <button onclick="resetFilters()">Reset</button>
    </div>
    <table>
        <thead><tr><th>Čas</th><th>Zákazník</th><th>Trasa</th><th>Lokace</th><th>Cena</th><th>Akce</th></tr></thead>
        <tbody id="history-table-body"></tbody>
    </table>

    <h3>Evidence uživatelů</h3>
    <table>
        <thead><tr><th>Registrace</th><th>Jméno</th><th>Telefon</th><th>Lokace</th><th>Akce</th></tr></thead>
        <tbody id="stats-table-body"></tbody>
    </table>
</div>

<script>
    // --- KONFIGURACE ---
    const firebaseConfig = {
        apiKey: "VAŠE_API_KEY",
        authDomain: "VÁŠ_PROJEKT.firebaseapp.com",
        projectId: "VÁŠ_PROJEKT",
        storageBucket: "VÁŠ_PROJEKT.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:123456"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allHistory = [];
    const map = L.map('map').setView([49.4405, 12.9321], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

    // --- FUNKCE ---
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('taxi_green_registered') === 'true') {
            document.getElementById('registration-overlay').style.display = 'none';
        } else {
            document.getElementById('registration-overlay').style.display = 'block';
        }
    });

    function handleCalculateRequest() {
        if (localStorage.getItem('taxi_green_registered') !== 'true') {
            document.getElementById('registration-overlay').style.display = 'block';
        } else {
            alert("Výpočet..."); // Zde doplňte vaši logiku výpočtu
        }
    }

    async function submitRegistration() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const consent = document.getElementById('reg-consent').checked;

        if (!name || !phone || !consent) return alert('Vyplňte vše a dejte souhlas.');

        try {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
            const locText = `Lat: ${pos.coords.latitude.toFixed(4)}, Lon: ${pos.coords.longitude.toFixed(4)}`;

            await db.collection("registered_customers").add({
                date: new Date(), fullName: name, phone: phone, location: locText
            });

            localStorage.setItem('taxi_green_registered', 'true');
            localStorage.setItem('taxi_green_location', locText);
            document.getElementById('registration-overlay').style.display = 'none';
            alert("Registrace proběhla úspěšně!");
        } catch (e) {
            alert("Povolte GPS polohu!");
        }
    }

    function loadStatistics() {
        db.collection("registered_customers").get().then(snapshot => {
            const tbody = document.getElementById("stats-table-body");
            tbody.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `<tr><td>${d.date.toDate().toLocaleDateString()}</td><td>${d.fullName}</td><td>${d.phone}</td><td>${d.location}</td><td><button class="btn-delete" onclick="deleteEntry('registered_customers', '${doc.id}')">Smazat</button></td></tr>`;
            });
        });

        db.collection("search_history").get().then(snapshot => {
            allHistory = [];
            snapshot.forEach(doc => allHistory.push({ id: doc.id, ...doc.data() }));
            renderHistory(allHistory);
        });
    }

    function renderHistory(data) {
        const tbody = document.getElementById("history-table-body");
        tbody.innerHTML = "";
        data.forEach(d => {
            tbody.innerHTML += `<tr>
                <td>${d.date ? d.date.toDate().toLocaleString() : '-'}</td>
                <td>${d.name || '-'}</td>
                <td>${d.pickup || '-'} → ${d.dropoff || '-'}</td>
                <td>${d.userLocation || '-'}</td>
                <td>${d.price || 0} Kč</td>
                <td><button class="btn-delete" onclick="deleteEntry('search_history', '${d.id}')">Smazat</button></td>
            </tr>`;
        });
    }

    function deleteEntry(col, id) {
        if(confirm("Smazat?")) {
            db.collection(col).doc(id).delete().then(() => loadStatistics());
        }
    }

    function filterHistory() {
        const from = new Date(document.getElementById('filter-from').value).getTime();
        const to = new Date(document.getElementById('filter-to').value).getTime();
        const filtered = allHistory.filter(item => {
            const t = item.date.toDate().getTime();
            return (!from || t >= from) && (!to || t <= to + 86400000);
        });
        renderHistory(filtered);
    }

    function resetFilters() {
        document.getElementById('filter-from').value = "";
        document.getElementById('filter-to').value = "";
        renderHistory(allHistory);
    }

    function handleAdminClick() {
        const pass = prompt("Heslo:");
        if (pass === "263654") { // Vaše heslo
            document.getElementById("admin-view").style.display = "block";
            loadStatistics();
        }
    }

    function closeAdmin() { document.getElementById("admin-view").style.display = "none"; }
</script>
</body>
</html>
